<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Manager AI - Your AI Business Manager</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#136dec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#0a0f16",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .vibrant-blob {
            filter: blur(80px);
            opacity: 0.6;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .dark .glass-card {
            background: rgba(16, 24, 34, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-[#111418] dark:text-white antialiased min-h-screen relative overflow-x-hidden">
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="vibrant-blob absolute -top-24 -left-24 w-96 h-96 bg-primary rounded-full"></div>
        <div class="vibrant-blob absolute top-1/2 -right-48 w-[500px] h-[500px] bg-blue-400 rounded-full"></div>
        <div class="vibrant-blob absolute -bottom-24 left-1/4 w-80 h-80 bg-indigo-500 rounded-full"></div>
    </div>
    <header class="w-full">
        <div class="max-w-[1280px] mx-auto px-6 py-6 flex items-center justify-between">
            <div onclick="window.location.href='/'"
                class="flex items-center gap-4 text-primary cursor-pointer hover:opacity-80 transition-opacity">
                <div class="size-8">
                    <svg fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M24 45.8096C19.6865 45.8096 15.4698 44.5305 11.8832 42.134C8.29667 39.7376 5.50128 36.3314 3.85056 32.3462C2.19985 28.361 1.76794 23.9758 2.60947 19.7452C3.451 15.5145 5.52816 11.6284 8.57829 8.5783C11.6284 5.52817 15.5145 3.45101 19.7452 2.60948C23.9758 1.76795 28.361 2.19986 32.3462 3.85057C36.3314 5.50129 39.7376 8.29668 42.134 11.8833C44.5305 15.4698 45.8096 19.6865 45.8096 24L24 24L24 45.8096Z"
                            fill="currentColor"></path>
                    </svg>
                </div>
                <h2 class="text-[#111418] dark:text-white text-xl font-bold leading-tight tracking-[-0.015em]">Manager
                    AI</h2>
            </div>
            <div class="flex gap-4">
                <a class="text-sm font-medium text-[#617289] dark:text-gray-400 hover:text-primary transition-colors py-2"
                    href="/">Back to website</a>
            </div>
        </div>
    </header>
    <main class="flex items-center justify-center min-h-[calc(100vh-140px)] px-6 py-12">
        <div class="w-full max-w-[440px]">
            <div class="glass-card rounded-3xl p-8 md:p-10 shadow-2xl">
                <div class="mb-8 text-center">
                    <h1 class="text-3xl font-black text-[#111418] dark:text-white mb-2">Welcome Back</h1>
                    <p class="text-[#617289] dark:text-gray-400">Access your Manager AI dashboard</p>
                </div>
                <form action="/login" method="POST" class="space-y-6">
                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-[#111418] dark:text-gray-200" for="email">Email
                            Address</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xl">mail</span>
                            <input name="email"
                                class="w-full pl-11 pr-4 py-3 rounded-xl border-[#dbe0e6] dark:border-gray-700 dark:bg-gray-800/50 focus:ring-primary focus:border-primary bg-white/50 transition-all"
                                id="email" placeholder="name@company.com" required="" type="email" />
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div class="flex items-center justify-between">
                            <label class="block text-sm font-bold text-[#111418] dark:text-gray-200"
                                for="password">Password</label>
                            <a class="text-xs font-bold text-primary hover:underline" href="#">Forgot?</a>
                        </div>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xl">lock</span>
                            <input name="password"
                                class="w-full pl-11 pr-4 py-3 rounded-xl border-[#dbe0e6] dark:border-gray-700 dark:bg-gray-800/50 focus:ring-primary focus:border-primary bg-white/50 transition-all"
                                id="password" placeholder="••••••••" required="" type="password" />
                        </div>
                    </div>
                    <div class="flex items-center">
                        <input class="h-4 w-4 rounded border-gray-300 text-primary focus:ring-primary" id="remember"
                            name="remember" type="checkbox" />
                        <label class="ml-2 block text-sm text-[#617289] dark:text-gray-400" for="remember">Remember me
                            for 30 days</label>
                    </div>
                    <button
                        class="w-full bg-primary hover:bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all transform hover:-translate-y-0.5 active:scale-95"
                        type="submit">
                        Sign In
                    </button>
                </form>
                <div class="mt-8">
                    <div class="relative mb-8">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-[#dbe0e6] dark:border-gray-700"></div>
                        </div>
                        <div class="relative flex justify-center text-xs uppercase">
                            <span class="bg-transparent px-2 text-[#617289] dark:text-gray-400 font-medium">Or continue
                                with</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 gap-4">
                        <button onclick="simulateGoogleLogin()" type="button"
                            class="flex items-center justify-center gap-3 py-3 px-4 border border-[#dbe0e6] dark:border-gray-700 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-800 transition-all bg-white/50 dark:bg-gray-800/30">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                                    fill="#4285F4"></path>
                                <path
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                                    fill="#34A853"></path>
                                <path
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                                    fill="#FBBC05"></path>
                                <path
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                                    fill="#EA4335"></path>
                            </svg>
                            <span class="text-sm font-bold text-[#111418] dark:text-white">Sign in with Google</span>
                        </button>
                    </div>
                </div>
                <div class="mt-8 text-center">
                    <p class="text-sm text-[#617289] dark:text-gray-400">
                        Don't have an account?
                        <a class="text-primary font-bold hover:underline" href="#">Get started free</a>
                    </p>
                </div>
            </div>
            <div class="mt-8 flex justify-center gap-6">
                <a class="text-xs text-[#617289] dark:text-gray-500 hover:text-primary transition-colors"
                    href="#">Privacy Policy</a>
                <a class="text-xs text-[#617289] dark:text-gray-500 hover:text-primary transition-colors" href="#">Terms
                    of Service</a>
                <a class="text-xs text-[#617289] dark:text-gray-500 hover:text-primary transition-colors" href="#">Help
                    Center</a>
            </div>
            <p class="mt-8 text-center text-xs text-[#617289]/60 dark:text-gray-600">
                © 2025 Manager AI. All rights reserved.
            </p>
        </div>
    </main>
    <script>
        // Simulated Google Login for demo purposes
        function simulateGoogleLogin() {
            // Pre-filled Google account prompt
            const email = prompt("Google Auth Simulation:\n\nPlease select your Google Email Account to sign in.", "google_user@gmail.com");

            if (email) {
                // Submit silently to our backend Google mock endpoint
                const form = document.createElement("form");
                form.method = "POST";
                form.action = "/api/auth/google";

                const emailField = document.createElement("input");
                emailField.type = "hidden";
                emailField.name = "email";
                emailField.value = email;

                form.appendChild(emailField);
                document.body.appendChild(form);
                form.submit();
            }
        }
    </script>
</body>

</html>
