<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="theme-color" content="#ffffff" />
    <title>Manager AI - User Profile</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: 'Inter, sans-serif' },
                    colors: {
                        primary: '#136dec',
                        "background-light": '#f8fafc',
                        "background-dark": '#0f172a',
                    }
                }
            }
        };
    </script>
    <script>
        // Auto-logout after 15 minutes of inactivity for privacy
        (function () {
            let timeout;
            function resetTimer() {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    window.location.href = '/logout';
                }, 15 * 60 * 1000);
            }
            ['mousemove', 'keydown', 'scroll', 'click', 'touchstart'].forEach(evt =>
                document.addEventListener(evt, resetTimer, true)
            );
            resetTimer();
        })();
    </script>
</head>

<body
    class="bg-background-light dark:bg-[#0f172a] font-sans text-[#111418] dark:text-white transition-colors duration-200 min-h-screen flex flex-col">
    <!-- Top Navigation Bar -->
    <header
        class="flex items-center justify-between whitespace-nowrap border-b border-solid border-[#dbe0e6] dark:border-white/10 bg-white dark:bg-background-dark px-10 py-3 sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-4 text-[#111418] dark:text-white cursor-pointer"
            onclick="window.location.href='/dashboard'">
            <div class="size-6 text-primary">
                <svg fill="currentColor" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M24 45.8096C19.6865 45.8096 15.4698 44.5305 11.8832 42.134C8.29667 39.7376 5.50128 36.3314 3.85056 32.3462C2.19985 28.361 1.76794 23.9758 2.60947 19.7452C3.451 15.5145 5.52816 11.6284 8.57829 8.5783C11.6284 5.52817 15.5145 3.45101 19.7452 2.60948C23.9758 1.76795 28.361 2.19986 32.3462 3.85057C36.3314 5.50129 39.7376 8.29668 42.134 11.8833C44.5305 15.4698 45.8096 19.6865 45.8096 24L24 24L24 45.8096Z">
                    </path>
                </svg>
            </div>
            <h2 class="text-lg font-bold leading-tight tracking-[-0.015em]">Manager AI</h2>
        </div>
        <div class="flex flex-1 justify-end items-center gap-6">
            <nav class="hidden md:flex items-center gap-6 text-sm font-medium text-[#617289] dark:text-gray-400">
                <a class="hover:text-primary transition-colors" href="/dashboard">Dashboard</a>
                <a class="hover:text-primary transition-colors" href="/inventory">Inventory</a>
                <a class="hover:text-primary transition-colors" href="/sales">Sales</a>
            </nav>
            <button onclick="window.location.href='/dashboard'"
                class="flex items-center gap-2 px-4 py-2 border border-[#dbe0e6] dark:border-white/10 rounded-lg text-sm font-semibold hover:bg-background-light dark:hover:bg-white/5 transition-colors">
                <span class="material-symbols-outlined text-sm">home</span> Return
            </button>
        </div>
    </header>

    <main class="flex-1 max-w-3xl w-full mx-auto px-6 py-12 flex flex-col gap-8">
        <!-- Profile Header -->
        <div class="flex flex-col items-center gap-4 text-center">
            <div id="profile-avatar-large"
                class="w-32 h-32 rounded-full flex items-center justify-center bg-[#facab0] text-primary font-bold text-5xl shadow-lg border-4 border-white dark:border-background-dark relative overflow-hidden ring-4 ring-primary/20">
                ?
            </div>
            <div>
                <h1 id="profile-name-large" class="text-[#111418] dark:text-white text-3xl font-black tracking-tight">
                    Loading...</h1>
                <p id="profile-role-large" class="text-primary text-sm font-bold uppercase tracking-widest mt-1">
                    Loading...</p>
            </div>
        </div>

        <!-- Account Settings Card -->
        <div
            class="bg-white dark:bg-[#1c2632] rounded-2xl border border-[#dbe0e6] dark:border-white/10 shadow-xl overflow-hidden mt-4">
            <div
                class="p-6 border-b border-[#dbe0e6] dark:border-white/10 bg-background-light dark:bg-background-dark/30">
                <h3 class="text-[#111418] dark:text-white text-lg font-bold flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">person</span> Account Overview
                </h3>
                <p class="text-[#617289] dark:text-gray-400 text-sm mt-1">View your personal Manager AI credentials
                    connected to this workspace.</p>
            </div>

            <div class="p-8 flex flex-col gap-6">
                <!-- Data Row -->
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-bold text-[#111418] dark:text-white">Profile Name</label>
                    <input id="input-name" type="text" readonly
                        class="w-full bg-[#f0f2f4] dark:bg-background-dark border border-[#dbe0e6] dark:border-white/10 rounded-lg px-4 py-3 text-[#617289] dark:text-gray-300 font-medium focus:outline-none cursor-not-allowed"
                        value="Loading...">
                    <p class="text-xs text-[#617289] dark:text-gray-500">Your profile name is automatically generated
                        from your email prefix.</p>
                </div>

                <!-- Data Row -->
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-bold text-[#111418] dark:text-white">Email Address</label>
                    <input id="input-email" type="email" readonly
                        class="w-full bg-[#f0f2f4] dark:bg-background-dark border border-[#dbe0e6] dark:border-white/10 rounded-lg px-4 py-3 text-[#617289] dark:text-gray-300 font-medium focus:outline-none cursor-not-allowed"
                        value="Loading...">
                </div>

                <!-- Data Row -->
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-bold text-[#111418] dark:text-white">Role Level</label>
                    <div
                        class="flex items-center gap-2 px-4 py-3 bg-primary/10 border border-primary/20 rounded-lg max-w-max">
                        <span class="material-symbols-outlined text-primary text-sm">shield_person</span>
                        <span id="profile-role-badge"
                            class="text-primary text-sm font-bold tracking-wider">Loading...</span>
                    </div>
                </div>
            </div>

            <div
                class="p-6 bg-background-light dark:bg-background-dark/30 border-t border-[#dbe0e6] dark:border-white/10 flex justify-end">
                <button onclick="handleLogout()"
                    class="flex items-center gap-2 px-6 py-3 bg-red-500 hover:bg-red-600 text-white rounded-lg text-sm font-bold transition-colors shadow-md shadow-red-500/20">
                    <span class="material-symbols-outlined text-base">logout</span> Sign Out Completely
                </button>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-8 text-center">
        <p class="text-[#617289] dark:text-gray-400 text-sm">© 2024 Manager AI. Secured connection.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/user/profile');
                if (!res.ok) {
                    window.location.href = '/login';
                    return;
                }
                const data = await res.json();

                // Populate DOM bounds
                document.getElementById('profile-name-large').textContent = data.name;
                document.getElementById('profile-avatar-large').textContent = data.initial;
                document.getElementById('profile-role-large').textContent = data.role;
                document.getElementById('profile-role-badge').textContent = data.role + " ACCESS";

                document.getElementById('input-name').value = data.name;
                document.getElementById('input-email').value = data.email;
            } catch (e) {
                console.error("Failed to load profile:", e);
            }
        });

        async function handleLogout() {
            if (!confirm("Are you sure you want to sign out of Manager AI?")) return;
            try {
                const res = await fetch('/api/logout', { method: 'POST' });
                if (res.ok) {
                    window.location.href = '/login';
                } else {
                    alert('Logout failed');
                }
            } catch (e) {
                console.error("Logout err", e);
            }
        }
    </script>
</body>

</html>
